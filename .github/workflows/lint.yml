name: Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swiftlint:
    name: SwiftLint
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Cache SwiftLint
        uses: actions/cache@v4
        id: cache-swiftlint
        with:
          path: /usr/local/bin/swiftlint
          key: swiftlint-0.57.1

      - name: Install SwiftLint
        if: steps.cache-swiftlint.outputs.cache-hit != 'true'
        run: |
          curl -sSL https://github.com/realm/SwiftLint/releases/download/0.57.1/portable_swiftlint.zip \
            -o /tmp/swiftlint.zip
          unzip -q /tmp/swiftlint.zip -d /tmp/swiftlint_bin
          sudo mv /tmp/swiftlint_bin/swiftlint /usr/local/bin/swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --reporter github-actions-logging --strict
