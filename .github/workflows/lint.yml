name: Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  swiftlint:
    name: SwiftLint
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: SwiftLint
        run: swiftlint lint --reporter github-actions-logging --strict
