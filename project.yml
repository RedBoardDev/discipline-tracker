name: DisciplineTracker
options:
  bundleIdPrefix: com.discipline
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.3"
  defaultConfig: Debug
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.2"
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: XRU7QD6255
    CODE_SIGN_STYLE: Automatic

targets:
  DisciplineTracker:
    type: application
    platform: iOS
    sources:
      - DisciplineTracker
    dependencies:
      - target: DisciplineTrackerWidget
        embed: true
    resources:
      - DisciplineTracker/Resources/Assets.xcassets
      - DisciplineTracker/Resources/objectives.json
    entitlements:
      path: DisciplineTracker/DisciplineTracker.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.discipline.tracker
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedByXcode
        PRODUCT_BUNDLE_IDENTIFIER: com.discipline.tracker
        PRODUCT_NAME: DisciplineTracker
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_CFBundleDisplayName: Discipline
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_EMIT_LOC_STRINGS: true

  DisciplineTrackerWidget:
    type: app-extension
    platform: iOS
    sources:
      - DisciplineTrackerWidget
      - path: DisciplineTracker/Shared/Utils/WidgetDataProvider.swift
        type: file
    info:
      path: DisciplineTrackerWidget/Info.plist
      properties:
        CFBundleDisplayName: Discipline Widget
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.discipline.tracker.widget
        PRODUCT_NAME: DisciplineTrackerWidget
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_EMIT_LOC_STRINGS: true
    entitlements:
      path: DisciplineTrackerWidget/DisciplineTrackerWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.discipline.tracker

  DisciplineTrackerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - DisciplineTrackerTests
    dependencies:
      - target: DisciplineTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.discipline.tracker.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/DisciplineTracker.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/DisciplineTracker"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  DisciplineTracker:
    build:
      targets:
        DisciplineTracker: all
        DisciplineTrackerWidget: all
        DisciplineTrackerTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - DisciplineTrackerTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
